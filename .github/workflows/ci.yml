name: CI

# Validates every pull request and push to main *before* merge so broken lint,
# type errors, or build failures never land on the default branch. This is the
# fast feedback gate; the heavier audits (SEO, mobile, security) run on a
# weekly schedule, not on every change.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so a force-push or rapid follow-up
# commit doesn't pile up duplicate jobs and waste runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate SEO output (JSON-LD, titles, descriptions, feeds)
        run: node scripts/seo-audit.mjs

      - name: Validate internal links & sitemap integrity
        run: node scripts/link-audit.mjs

  schema:
    name: Database schema check
    runs-on: ubuntu-latest

    # Spin up a throwaway Postgres and apply db/schema.sql against it. Catches
    # broken SQL before it reaches the live Neon database, and applies the file
    # twice to prove the "idempotent — safe to re-run" contract still holds.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tobe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply schema and verify idempotency
        env:
          PGPASSWORD: postgres
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGDATABASE: tobe_test
        run: |
          echo "── First apply ──"
          psql -v ON_ERROR_STOP=1 -q -f db/schema.sql
          echo "── Second apply (must be idempotent) ──"
          psql -v ON_ERROR_STOP=1 -q -f db/schema.sql
          echo "✅ db/schema.sql applies cleanly and is idempotent"
