name: Weekly Dependency Security Scan

on:
  schedule:
    # Run weekly on Monday at 7:00 AM UTC. npm advisories rarely change
    # day-to-day for this dependency set; weekly keeps signal without daily
    # runner spend. Trigger manually with workflow_dispatch when needed.
    - cron: "0 7 * * 1"
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: dependency-security
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-scan-root:
    name: Security Scan – Root App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (root)
        run: |
          echo "=== npm audit – Root Project ==="
          npm audit --audit-level=moderate || true

      - name: Check for critical vulnerabilities (root)
        run: |
          echo "=== Checking for critical/high vulnerabilities ==="
          npm audit --json 2>/dev/null | node .github/scripts/check-audit.js "root project" || true

      - name: Check for outdated dependencies (root)
        run: |
          echo "=== Outdated Dependencies – Root Project ==="
          npm outdated || true

  security-scan-echoes:
    name: Security Scan – Echoes Subsite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: echoes/package-lock.json

      - name: Install dependencies (echoes)
        working-directory: echoes
        run: npm ci

      - name: Run npm audit (echoes)
        working-directory: echoes
        run: |
          echo "=== npm audit – Echoes Subsite ==="
          npm audit --audit-level=moderate || true

      - name: Check for critical vulnerabilities (echoes)
        working-directory: echoes
        run: |
          echo "=== Checking for critical/high vulnerabilities ==="
          npm audit --json 2>/dev/null | node ../.github/scripts/check-audit.js "echoes subsite" || true

      - name: Check for outdated dependencies (echoes)
        working-directory: echoes
        run: |
          echo "=== Outdated Dependencies – Echoes Subsite ==="
          npm outdated || true
